services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    command: ["--quiet"]
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file: .env
    environment:
      MONGO_HOST: mongodb
    expose:
      - "3001"

  web:
    profiles: [prod]
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend/dist:/srv
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}

volumes:
  mongo_data:
  caddy_data:
  caddy_config:
